---
- name: Configure Grafana
  hosts: mlops_server
  become: true

  tasks:
    - name: Ensure Grafana keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Grafana GPG key
      ansible.builtin.get_url:
        url: https://apt.grafana.com/gpg.key
        dest: /tmp/grafana.key
        mode: "0644"

    - name: Dearmor Grafana key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/grafana.gpg /tmp/grafana.key
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Configure Grafana apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana

    - name: Install Grafana
      ansible.builtin.apt:
        name: grafana
        update_cache: true
        state: present

    - name: Create Grafana provisioning directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/grafana/provisioning/datasources
        - /etc/grafana/provisioning/dashboards
        - /etc/grafana/provisioning/alerting
        - /var/lib/grafana/dashboards

    - name: Deploy Grafana datasource config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/grafana-datasource.yml.j2"
        dest: /etc/grafana/provisioning/datasources/tlc-predictions.yml
        mode: "0644"
      notify: Restart Grafana

    - name: Deploy dashboard provider config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/grafana-dashboard-provider.yml.j2"
        dest: /etc/grafana/provisioning/dashboards/tlc-provider.yml
        mode: "0644"
      notify: Restart Grafana

    - name: Deploy Grafana dashboard JSON
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/tlc-dashboard.json.j2"
        dest: /var/lib/grafana/dashboards/tlc-demand-forecasting.json
        mode: "0644"
      notify: Restart Grafana

    - name: Deploy Grafana alert rules
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/grafana-alert-rules.yml.j2"
        dest: /etc/grafana/provisioning/alerting/tlc-alert-rules.yml
        mode: "0644"
      notify: Restart Grafana

    - name: Ensure Grafana service is running
      ansible.builtin.systemd:
        name: grafana-server
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for Grafana HTTP API
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ grafana_port }}"
        timeout: 30

  handlers:
    - name: Restart Grafana
      ansible.builtin.systemd:
        name: grafana-server
        state: restarted
