---
- name: Configure replay service
  hosts: mlops_server
  become: true

  tasks:
    - name: Ensure service directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ service_root }}"
        - "{{ sql_root }}"

    - name: Copy prediction service package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../prediction_service/"
        dest: "{{ service_root }}/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        directory_mode: "0755"

    - name: Ensure replay script is executable
      ansible.builtin.file:
        path: "{{ service_root }}/run_replay_cycle.py"
        mode: "0755"

    - name: Write replay environment file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/tlc-replay.env.j2"
        dest: "{{ env_root }}/replay.env"
        mode: "0600"

    - name: Deploy replay systemd unit
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/tlc-replay.service.j2"
        dest: /etc/systemd/system/tlc-replay.service
        mode: "0644"
      notify: Restart Replay Timer

    - name: Deploy replay timer unit
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/tlc-replay.timer.j2"
        dest: /etc/systemd/system/tlc-replay.timer
        mode: "0644"
      notify: Restart Replay Timer

    - name: Ensure replay timer is enabled
      ansible.builtin.systemd:
        name: tlc-replay.timer
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart Replay Timer
      ansible.builtin.systemd:
        name: tlc-replay.timer
        state: restarted
        enabled: true
        daemon_reload: true
