name: Deploy Production

on:
  push:
    tags:
      - "prod-v*"
  workflow_dispatch:
    inputs:
      run_replay_backfill:
        description: "Run a full replay backfill after deploy"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-production:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment_name: production
      run_replay_backfill: ${{ github.event_name == 'workflow_dispatch' && inputs.run_replay_backfill || false }}
    secrets: inherit
