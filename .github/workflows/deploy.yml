name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      run_replay_backfill:
        description: "Run a full replay backfill after deploy"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-production:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment_name: production
      run_replay_backfill: ${{ inputs.run_replay_backfill }}
    secrets: inherit
